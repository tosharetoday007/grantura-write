<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<style>
:root {
  --teal:   #1D9E75;
  --teal-l: #E1F5EE;
  --teal-d: #085041;
  --amber-l:#FAEEDA;
  --amber-d:#633806;
  --amber:  #EF9F27;
  --bg:     #F7F6F2;
  --surface:#FFFFFF;
  --border: rgba(0,0,0,0.10);
  --text:   #1a1a18;
  --muted:  #6b6b66;
  --hint:   #a0a09a;
  --serif:  Georgia, serif;
  --sans:   system-ui, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--surface);
  color: var(--text);
  width: 340px;
  font-size: 13px;
}
.header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 14px;
  border-bottom: 0.5px solid var(--border);
  background: var(--teal-d);
  color: white;
}
.logo {
  width: 24px; height: 24px;
  background: white;
  border-radius: 5px;
  display: flex; align-items: center; justify-content: center;
}
.logo svg { fill: var(--teal-d); width: 14px; height: 14px; }
.header-title { font-size: 14px; font-weight: 500; }
.header-sub { font-size: 11px; opacity: 0.75; margin-left: auto; }
.body { padding: 14px; }
.field { margin-bottom: 10px; }
.field label { display: block; font-size: 10px; font-weight: 500; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .05em; }
.field input, .field textarea {
  width: 100%;
  border: 0.5px solid var(--border);
  border-radius: 5px;
  padding: 6px 8px;
  font-size: 12px;
  font-family: var(--sans);
  color: var(--text);
  background: var(--bg);
  outline: none;
}
.field input:focus, .field textarea:focus { border-color: var(--teal); background: white; }
.field textarea { resize: none; line-height: 1.5; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.status {
  font-size: 11px;
  padding: 7px 10px;
  border-radius: 5px;
  margin-bottom: 10px;
  line-height: 1.4;
}
.status.detecting { background: var(--teal-l); color: var(--teal-d); }
.status.manual    { background: var(--amber-l); color: var(--amber-d); }
.status.saved     { background: var(--teal-l); color: var(--teal-d); font-weight: 500; }
.btn {
  width: 100%;
  padding: 8px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--sans);
  border: none;
  transition: background .15s;
}
.btn-primary { background: var(--teal); color: white; }
.btn-primary:hover { background: var(--teal-d); }
.btn-primary:disabled { background: var(--hint); cursor: not-allowed; }
.btn-sec { background: var(--bg); color: var(--text); border: 0.5px solid var(--border); margin-top: 6px; }
.btn-sec:hover { background: var(--border); }
.footer {
  padding: 8px 14px;
  border-top: 0.5px solid var(--border);
  font-size: 11px;
  color: var(--hint);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer a { color: var(--teal-d); text-decoration: none; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <svg viewBox="0 0 16 16"><path d="M3 2h10a1 1 0 011 1v10a1 1 0 01-1 1H3a1 1 0 01-1-1V3a1 1 0 011-1zm1 3v1h8V5H4zm0 3v1h8V8H4zm0 3v1h5v-1H4z"/></svg>
  </div>
  <span class="header-title">Grantura Write</span>
  <span class="header-sub">Reference capture</span>
</div>

<div class="body">
  <div class="status detecting" id="status">Detecting paper metadata…</div>

  <div class="field">
    <label>Title</label>
    <textarea id="f-title" rows="2"></textarea>
  </div>
  <div class="field">
    <label>Authors</label>
    <input type="text" id="f-authors" placeholder="Smith J, Jones A…"/>
  </div>
  <div class="row">
    <div class="field">
      <label>Journal</label>
      <input type="text" id="f-journal"/>
    </div>
    <div class="field">
      <label>Year</label>
      <input type="text" id="f-year" maxlength="4"/>
    </div>
  </div>
  <div class="row">
    <div class="field">
      <label>Volume / Issue</label>
      <input type="text" id="f-vol" placeholder="12(3)"/>
    </div>
    <div class="field">
      <label>Pages</label>
      <input type="text" id="f-pages" placeholder="123–130"/>
    </div>
  </div>
  <div class="field">
    <label>DOI</label>
    <input type="text" id="f-doi" placeholder="10.xxxx/…"/>
  </div>

  <button class="btn btn-primary" id="save-btn" onclick="saveRef()">Add to reference library</button>
  <button class="btn btn-sec" onclick="openSidebar()">Open Grantura Write sidebar</button>
</div>

<div class="footer">
  <span id="lib-count">Loading library…</span>
  <a href="#" onclick="openSidebar()">Open full library →</a>
</div>

<script>
const fields = {
  title:   document.getElementById("f-title"),
  authors: document.getElementById("f-authors"),
  journal: document.getElementById("f-journal"),
  year:    document.getElementById("f-year"),
  vol:     document.getElementById("f-vol"),
  pages:   document.getElementById("f-pages"),
  doi:     document.getElementById("f-doi")
};
const status  = document.getElementById("status");
const saveBtn = document.getElementById("save-btn");
let captured  = {};

async function init() {
  // Get library count
  const refs = await browser.runtime.sendMessage({ type: "GET_REFS" });
  document.getElementById("lib-count").textContent = (refs.length || 0) + " refs in library";

  // Ask content script to extract metadata from current tab
  const [tab] = await browser.tabs.query({ active: true, currentWindow: true });
  try {
    const data = await browser.tabs.sendMessage(tab.id, { type: "EXTRACT_META" });
    if (data && data.title) {
      populate(data);
      status.textContent = "Metadata detected — review and save.";
      status.className = "status detecting";
    } else {
      status.textContent = "No metadata found — enter details manually.";
      status.className = "status manual";
    }
    captured = data || {};
  } catch(e) {
    status.textContent = "Could not read page — enter details manually.";
    status.className = "status manual";
    captured = { url: tab.url };
  }
}

function populate(d) {
  fields.title.value   = d.title   || "";
  fields.authors.value = d.authors || "";
  fields.journal.value = d.journal || "";
  fields.year.value    = d.year    || "";
  fields.vol.value     = [d.volume, d.issue].filter(Boolean).join("(").replace(/\((.+)/, "($1)");
  fields.pages.value   = d.pages   || "";
  fields.doi.value     = d.doi     || "";
}

async function saveRef() {
  const title = fields.title.value.trim();
  if (!title) { status.textContent = "Please enter a title."; status.className = "status manual"; return; }
  saveBtn.disabled = true;
  saveBtn.textContent = "Saving…";

  const volIssue = fields.vol.value.match(/(\d+)(?:\((\d+)\))?/);
  await browser.runtime.sendMessage({
    type: "CAPTURE_REF",
    data: {
      title,
      authors: fields.authors.value,
      journal: fields.journal.value,
      year:    fields.year.value,
      volume:  volIssue ? volIssue[1] : "",
      issue:   volIssue ? (volIssue[2]||"") : "",
      pages:   fields.pages.value,
      doi:     fields.doi.value,
      url:     captured.url || "",
      abstract:captured.abstract || "",
      issn:    captured.issn || ""
    }
  });

  status.textContent = "Saved to your Grantura Write library!";
  status.className = "status saved";
  saveBtn.textContent = "Saved!";
  setTimeout(() => window.close(), 1200);
}

async function openSidebar() {
  await browser.runtime.sendMessage({ type: "OPEN_SIDEBAR" });
  window.close();
}

init();
</script>
</body>
</html>
